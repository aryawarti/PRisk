<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PRisk — Pull Request Risk Intelligence</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="PRisk analyses GitHub pull requests with a five-agent AI pipeline: change understanding, blast radius, engineering review, testing strategy, and a merge confidence score.">
  <meta name="theme-color" content="#2f5a63">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Crect width='36' height='36' rx='8' fill='%232f5a63'/%3E%3Ccircle cx='18' cy='18' r='11' stroke='white' stroke-width='2' opacity='0.4' fill='none'/%3E%3Ccircle cx='18' cy='18' r='4' fill='white'/%3E%3Cpath d='M18 7 A11 11 0 0 1 29 18' stroke='white' stroke-width='2.5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    // Set theme before Angular boots so there's no light-mode flash.
    (function () {
      try {
        var theme = localStorage.getItem('prisk.theme');
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* default to light */ }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
